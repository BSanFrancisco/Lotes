<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Buscador de Lotes · San Francisco</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f3f6fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 32px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 150px;
      height: auto;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a202c;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      color: #718096;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .field-label {
      text-align: left;
      font-weight: 700;
      color: #155724;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    input[type="number"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      border: 2.5px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      color: #1a202c;
      background: #f3f6fa;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
      appearance: textfield;
      margin-bottom: 14px;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { display: none; }
    input[type="number"]:focus {
      border-color: #1e7e34;
      box-shadow: 0 0 0 3px rgba(30,126,52,0.12);
      background: #fff;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      padding: 15px 10px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: filter 0.18s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn:hover { filter: brightness(0.88); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-maps { background: #1e7e34; }
    .btn-waze { background: #33ccff; }
    .btn svg { flex-shrink: 0; }
    .error-box {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      border-radius: 10px;
      color: #c53030;
      font-size: 14px;
      font-weight: 600;
      text-align: left;
    }
    .hint {
      margin-top: 16px;
      color: #a0aec0;
      font-size: 12px;
    }
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 24px 0;
    }
    .footer { color: #a0aec0; font-size: 12px; }
  </style>
</head>

      const errorDiv = document.getElementById('errorMsg');
      const val = input.value.trim();

      errorDiv.style.display = 'none';

      if (!val || isNaN(val) || val === '') {
        showError('⚠️ Por favor ingresá un número de lote.');
        return;
      }

      const num = parseInt(val, 10);

      if (num < 1 || num > 573 || !Number.isInteger(num)) {
        showError('⚠️ El número debe estar entre 1 y 573.');
        return;
      }

      const coords = LOTES[num];
      if (!coords) {
        showError('⚠️ No se encontró el lote ' + num + '. Verificá el número.');
        return;
      }

      const lat = coords[0];
      const lng = coords[1];

      let url;
      if (app === 'waze') {
        url = 'https://waze.com/ul?ll=' + lat + ',' + lng + '&navigate=yes';
      } else {
        url = 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lng;
      }

      window.location.href = url;
    }

    function showError(msg) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }
  </script>
</body>
</html>
