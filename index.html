<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Buscador de Lotes · Santa Fe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1e7e34;
      --green-dark: #155724;
      --green-light: #d4edda;
      --blue: #1565c0;
      --gray-bg: #f3f6fa;
      --card-bg: #ffffff;
      --text: #1a202c;
      --muted: #718096;
      --border: #e2e8f0;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 140px;
      height: auto;
      margin: 0 auto 16px;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field-label {
      text-align: left;
      font-weight: 700;
      color: var(--green-dark);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="number"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      border: 2.5px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background: var(--gray-bg);
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { display: none; }

    input[type="number"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(30,126,52,0.12);
      background: #fff;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn svg { flex-shrink: 0; }

    .btn-waze {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      background: #00bcd4;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      letter-spacing: 0.2px;
      margin-top: 12px;
    }
    .btn-waze:hover { background: #0097a7; transform: translateY(-1px); }
    .btn-waze:active { transform: translateY(0); }
    .btn-waze svg { flex-shrink: 0; }

    .error-box {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      border-radius: 10px;
      color: #c53030;
      font-size: 14px;
      font-weight: 600;
      text-align: left;
    }

    .hint {
      margin-top: 18px;
      color: #a0aec0;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .footer {
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

    document.getElementById('lotInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') irAMaps();
    });

    function irAMaps() {
      const input = document.getElementById('lotInput');
      const errorDiv = document.getElementById('errorMsg');
      const val = input.value.trim();

      errorDiv.style.display = 'none';

      if (!val || isNaN(val) || val === '') {
        showError('⚠️ Por favor ingresá un número de lote.');
        return;
      }

      const num = parseInt(val, 10);

      if (num < 1 || num > 573 || !Number.isInteger(num)) {
        showError('⚠️ El número debe estar entre 1 y 573.');
        return;
      }

      const coords = LOTES[num];
      if (!coords) {
        showError('⚠️ No se encontró el lote ' + num + '. Verificá el número.');
        return;
      }

      const lat = coords[0];
      const lng = coords[1];
      // Opens Google Maps at the exact coordinates with a pin
      const url = 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lng;
      window.location.href = url;
    }

    function irAWaze() {
      const input = document.getElementById('lotInput');
      const errorDiv = document.getElementById('errorMsg');
      const val = input.value.trim();

      errorDiv.style.display = 'none';

      if (!val || isNaN(val) || val === '') {
        showError('⚠️ Por favor ingresá un número de lote.');
        return;
      }

      const num = parseInt(val, 10);

      if (num < 1 || num > 573 || !Number.isInteger(num)) {
        showError('⚠️ El número debe estar entre 1 y 573.');
        return;
      }

      const coords = LOTES[num];
      if (!coords) {
        showError('⚠️ No se encontró el lote ' + num + '. Verificá el número.');
        return;
      }

      const lat = coords[0];
      const lng = coords[1];
      const url = 'https://waze.com/ul?ll=' + lat + ',' + lng + '&navigate=yes';
      window.location.href = url;
    }

    function showError(msg) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }
